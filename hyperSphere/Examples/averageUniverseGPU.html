        	const x = vertice.x;//, xx = x * x;

        	// 1. Полный радиус гиперсферы

//        		return angles([0, 0, 0]);

        /**
         *<pre>
         [Deepseek. Гипербола через три точки]{@link https://chat.deepseek.com/a/chat/s/1f8ddb5d-b9de-43d3-aa0d-3cfe49cd48a3}

         Функция для вычисления коэффициентов гиперболы по параметру p
         * </pre>
         * @param {float} p <pre>Параметр, который меняется в диапазоне от 0 до 1 и который используется для вычисления параметров гиперболы.
        Если p = 0, то гипербола вырождется в прямую.
        Если p = 1, то гипербола вырождется в два отрезка прямых:
           Первый отрезок: (arc1 = 0, y1 = 0), (arc2 = 0, y2 = π) вертикальная прямая из начала координат.
           Второй отрезок: (arc1 = 0, y1 = π), (arc2 = π, y2 = π) горизональная прямая.

        let hyperbola_gpu;
        const calculateHyperbola = (p) => {

                        fn hyperbola_gpu(arc: f32, i: u32) -> f32 {

                        }`;
                return (arc) => {

                }

            // Общий случай: гипербола вида y = a/(x - h) + k

            // и дополнительное условие: при x = 0, y = 0
            // при x = π, y = π

            // Из точки (0,0): 0 = a/(0 - h) + k => k = a/h

            // Вводим параметр p для контроля кривизны
            // Будем использовать p для определения положения асимптоты h
            // При p -> 0: h -> -∞ (гипербола вырождается в прямую)
            // При p -> 1: h -> 0 (гипербола вырождается в вертикальную линию)

            // Свяжем h с p: h = - (1-p)/p * C, где C некоторая константа
            // Чтобы при p=1, h=0; при p=0, h=-∞
            // Возьмем C = π/2 для хорошей визуализации

            const C = π / 2;

            // Избегаем деления на ноль при p=0 (уже обработано выше)
            let h;
            if (p < 0.001) {
                // Для очень малых p используем линейную аппроксимацию

            } else {

            }

            // Вычисляем a из уравнения π = a/(π - h) + a/h
            // a = π / (1/(π - h) + 1/h) = π / ((h + π - h)/(h(π - h))) = π * h(π - h) / π = h(π - h)
            // Упростим: a = h * (PI - h)

            const a = h * (π - h);

            // Вычисляем k

            hyperbola_gpu = `

                            if (abs(x - (${h})) < 0.001) {
                                messageBuffer.errorCode = 1u; // Код ошибки 1 = "hyperbola_gpu: Under construction"
                                messageBuffer.i = i;
                                messageBuffer.value = x;
                                return PI;
                            }
                            return ${a} / (x - (${h})) + (${k});
                        }`;

                //		const { a, h, k } = hyperbola;

                // Генерируем точки слева от асимптоты (если асимптота слева от 0)

                if (Math.abs(x - h) < 0.001) {

                    console.error(sRandomVertice + ': calculateHyperbola. Under consraction');
                    return x;

        const hyperbola = calculateHyperbola(p);

            /*Этот метод не дает прибавки в производительности но проигрывает в случайности
            `
                        //LGC — Линейный конгруэнтный метод. Более быстрый, но чуть менее "хаотичный" вариант
                        fn random(state: ptr<function, u32>) -> f32 {

            `
                        //Хеширование (Hashing). Простой генератор псевдослучайных чисел (PCG). Permuted Congruential Generator (Перемешанный конгруэнтный генератор).
                        // Функция принимает указатель на состояние и обновляет его внутри
                        fn random(seed: ptr<function, u32>) -> f32 {

        const cartesianToPolarRandom = (Q) => { return cartesianToPolar({ x: Q[2], y: Q[3], z: Q[1], w: Q[0] }); }

        // 2. Создание ортонормированного базиса в касательном пространстве
        const createTangentBasis = (latitude, longitude, altitude) => {
            const a = altitude, b = Math.PI / 2 - latitude, c = longitude,

            ];

            const norm_e1 = Math.sqrt(e1.reduce((sum, val) => sum + val * val, 0));
            //e1.map создает новый массив путем деления каждого элемента на norm_e1
            const e1_norm = e1.map(v => v / norm_e1);

            // e2 - направление увеличения b (уменьшения latitude)
            const e2_raw = [
                0,
                -sina * sinb,
                sina * cosb * cosc,
                sina * cosb * sinc
            ];
            const norm_e2 = Math.sqrt(e2_raw.reduce((sum, val) => sum + val * val, 0));
            const e2_norm = norm_e2 > 1e-10 ? e2_raw.map(v => v / norm_e2) : [0, 0, 0, 0];

            // e3 - направление увеличения longitude
            const e3_raw = [
                0,
                0,
                -sina * sinb * sinc,
                sina * sinb * cosc
            ];
            const norm_e3 = Math.sqrt(e3_raw.reduce((sum, val) => sum + val * val, 0));
            const e3_norm = norm_e3 > 1e-10 ? e3_raw.map(v => v / norm_e3) : [0, 0, 0, 0];

            return [e1_norm, e2_norm, e3_norm];

        /**

        const calculateNewPoint = (startingPointParams, distance, eta, psi, R) => {

            const P = startingPointParams.P;

            const [e1, e2, e3] = [startingPointParams.e1, startingPointParams.e2, startingPointParams.e3];

            const u = [0, 0, 0, 0];
            for (let i = 0; i < 4; i++) {
                u[i] = coseta * e1[i] +
                    sinetacospsi * e2[i] +
                    sinetasinpsi * e3[i];
            }

            // Угловое расстояние
            const delta = distance / R;

            // Экспоненциальное отображение
            const Q = [0, 0, 0, 0];
            for (let i = 0; i < 4; i++) {
                Q[i] = Math.cos(delta) * P[i] + R * Math.sin(delta) * u[i];
            }

            // Обратное преобразование в углы
            const angles = cartesianToPolarRandom(Q);

            return angles;

         * Обратная функция распределения для равномерной выборки на S³
         * Для равномерного распределения на 3-сфере от северного полюса:
         * Плотность: f(θ) ∝ sin³(θ), где θ = distance/R
         * CDF: F(θ) = (3θ - 3sinθcosθ + 2sin³θ) / 4
         * Здесь используем численное решение обратной функции
         */
        const inverseCDF_S3 = (u) => {
            // u ∈ [0, 1] равномерно
            // Ищем θ такой, что CDF(θ) = u, θ ∈ [0, π]

            // Численное решение методом бисекции
            let low = 0;
            let high = Math.PI;
            const tolerance = 1e-10;
            const maxIterations = 100;

            for (let i = 0; i < maxIterations; i++) {
                const mid = (low + high) / 2;
                const cdfValue = CDF_S3(mid);

                if (Math.abs(cdfValue - u) < tolerance) {
                    return mid;
                }

                if (cdfValue < u) {
                    low = mid;
                } else {
                    high = mid;
                }
            }

            return (low + high) / 2;
        }

        // --- WebGPU: СЕРДЦЕ СИСТЕМЫ ---
        let device, pipeline, posBuf, velBuf, paramBuf, debugBuf, messageArray,
            anglesBufGPU, bindGroup;
        let availableAdapters = [];

        //for random function in WebGPU
        let timeBuffer;//frameBuffer,
        // Если ваш GPU-цикл runAuto работает очень быстро (например, 200 FPS), то за одну миллисекунду может пройти несколько кадров.
        // В этом случае в течение этой миллисекунды uTime будет одинаковым целым числом, и все кадры внутри этого промежутка выдадут идентичные «случайные» числа.
        // Что избежать этого умножаем на 1000, чтобы превратить миллисекунды в микросекунды.
        const timeMultiplier = 1000;

        async function getSafeAdapterName(adapter, index) {
            if (!adapter) return `${index + 1}. Неизвестное устройство`;
            let name = "WebGPU Adapter";
            if (adapter.info) name = adapter.info.description || adapter.info.vendor || name;
            return `${index + 1}. ${name}`;
        }

        async function findAdapters() {
            const select = document.getElementById('gpuSelect');
            if (!navigator.gpu) { select.innerHTML = '<option value="-1">WebGPU не поддерживается</option>'; return; }
            try {
                if (navigator.gpu.enumerateAdapters) availableAdapters = await navigator.gpu.enumerateAdapters();
                if (availableAdapters.length === 0) {
                    const high = await navigator.gpu.requestAdapter({ powerPreference: 'high-performance' });
                    if (high) availableAdapters.push(high);
                }
                select.innerHTML = '';
                for (let i = 0; i < availableAdapters.length; i++) {
                    const displayName = await getSafeAdapterName(availableAdapters[i], i);
                    const opt = document.createElement('option'); opt.value = i; opt.text = displayName; select.appendChild(opt);
                }
            } catch (e) { select.innerHTML = '<option value="-1">Ошибка поиска</option>'; }
        }

        async function initWebGPU(idx) {
            if (device) device.destroy();
            const adapter = availableAdapters[idx];
            device = await adapter.requestDevice();
            document.getElementById('activeGpu').innerText = `Активен: ${await getSafeAdapterName(adapter, idx)}`;

            // ГЕНЕРАЦИЯ ШЕЙДЕРА (МЕТАПРОГРАММИРОВАНИЕ)
            const dynamicShaderCode = `
                        /* СТРУКТУРЫ ДАННЫХ */
                        struct Params {
                            radiusPrev: f32,      // Предыдущий радиус сферы
                            stepOffset: f32   // Индекс начала текущей группы
                        };

                        struct PolarAngles {
                            latitude: f32, longitude: f32, altitude: f32, _pad: f32
                        };

                        struct Message {
                            errorCode: u32,
                            i: u32,
                            value: f32,
                        };

                        struct StartingPointParams {
                            lat: f32,
                            alt: f32,
                            P: vec4<f32>,
                            tangentBasis: mat3x4<f32>
                        };

                        ${DEBUG_MODE ?
                        `
                        struct Debug {
                            value: vec4<f32>,
                            i: u32,
                            j: u32
                        };
                        `
                        : ``}

                        /* ПРИВЯЗКИ */
                        @group(0) @binding(0) var<storage, read_write> positions: array<vec4<f32>>;
                        @group(0) @binding(1) var<storage, read_write> velocities: array<vec4<f32>>;
                        @group(0) @binding(2) var<uniform> p_param: Params;
                        @group(0) @binding(3) var<storage, read_write> anglesBuf: array<PolarAngles>;
                        @group(0) @binding(4) var<storage, read_write> messageBuffer: Message;
//                        @group(0) @binding(5) var<uniform> frame: u32; //Для генератора случайных чисел
                        @group(0) @binding(5) var<uniform> uTime: u32; //Для генератора случайных чисел
                        ${DEBUG_MODE ? `@group(0) @binding(6) var<storage, read_write> debug: Debug;` : ``}

                        /* ВШИТЫЕ КОНСТАНТЫ (Generated by JS) */
                        const PI: f32 = ${π};
                        const DAMPING: f32 = ${DAMPING.toFixed(8)};
                        const REPULSION: f32 = ${REPULSION_STRENGTH.toFixed(8)};
                        const POINTS_PER_STEP: u32 = ${Math.floor(pointsPerStep)}u;

                        ${random_gpu}

                        ${hyperbola_gpu}

                        fn CDF_S3(theta: f32) -> f32 {
                            // CDF(θ) = (3θ - 3sinθcosθ + 2sin³θ) / 4
                            let sinTheta = sin(theta); let cosTheta = cos(theta); let sin3Theta = pow(sinTheta, 3.0);
                            return (3.0 * theta - 3.0 * sin(theta) * cos(theta) + 2.0 * sin3Theta) / 4.0;
                        }

                        fn inverseCDF_S3(u: f32) -> f32 {
                            // u ∈ [0, 1] равномерно
                            // Ищем θ такой, что CDF(θ) = u, θ ∈ [0, π]

                            // Численное решение методом бисекции
                            var low = 0.0; var high = PI;
                            let tolerance = 1e-10; let maxIterations = 100;
                            for (var i = 0; i < maxIterations; i++) {
                                let mid = (low + high) / 2.0;
                                let cdfValue = CDF_S3(mid);

                                if (abs(cdfValue - u) < tolerance) {
                                    return mid;
                                }

                                if (cdfValue < u) { low = mid; } else { high = mid; }
                            }

                            return (low + high) / 2.0;
                        }

                        fn getDistance(dist: f32, R: f32, arc: f32, seed: ptr<function, u32>) -> f32 {
                            if (arc == 0.0) { return 0.0; }
                            let y = 1.0 / arc - 1.0 / PI;
                            return dist / (1.0 + (y * R * random(seed)));
                        }

                        // 2. Создание ортонормированного базиса в касательном пространстве
                        fn createTangentBasis(latitude: f32, longitude: f32, altitude: f32) -> mat3x4<f32> {
                            let a = altitude; let b = PI / 2.0 - latitude; let c = longitude;
                            let sina = sin(a); let cosa = cos(a); let sinb = sin(b); let cosb = cos(b); let sinc = sin(c); let cosc = cos(c);

                            // e1 - направление увеличения altitude
                            let e1 = normalize(vec4<f32>(-sina, cosa*cosb, cosa*sinb*cosc, cosa*sinb*sinc));

                            // e2 - направление увеличения b (уменьшения latitude)
                            var e2 = vec4<f32>(0.0, -sina*sinb, sina*cosb*cosc, sina*cosb*sinc);
                            let n2 = length(e2);
                            if (n2 > 1e-10) { e2 = e2 / n2; } else { e2 = vec4<f32>(0.0, 0.0, 0.0, 0.0); }

                            // e3 - направление увеличения longitude
                            var e3 = vec4<f32>(0.0, 0.0, -sina*sinb*sinc, sina*sinb*cosc);
                            let n3 = length(e3);
                            if (n3 > 1e-10) { e3 = e3 / n3; } else { e2 = vec4<f32>(0.0, 0.0, 0.0, 0.0); }

                            return mat3x4<f32>(e1, e2, e3);
                        }
                        fn calculateNewPoint(startingPointParams: StartingPointParams, distance: f32, eta: f32, psi: f32, R: f32, seed: ptr<function, u32>) -> PolarAngles {

                            // Исходная точка
                            let P = startingPointParams.P;

                            // Касательный базис
                            let e1 = startingPointParams.tangentBasis[0]; let e2 = startingPointParams.tangentBasis[1]; let e3 = startingPointParams.tangentBasis[2];

                            //Компилятор оптимизирует эту строку и не будет по нескольку раз вычислять одинаковые тригонометрические функции
                            let u = cos(eta) * e1 + sin(eta) * cos(psi) * e2 + sin(eta) * sin(psi) * e3;

                            let delta = distance / R;

                            // Обратное преобразование в углы
                            var angles = cartesianToPolarRandom(cos(delta) * P + R * sin(delta) * u);

            				if (abs((abs(startingPointParams.lat) - PI / 2)) < 1e-12) { angles.longitude = random(seed) * 2 * PI - PI; }//Противоположная вершина находится на полюсе

                            return angles;
                        }
                        fn getStartingPointParams(oppositeVertice: PolarAngles) -> StartingPointParams {
                            let lat = oppositeVertice.latitude; let lon = oppositeVertice.longitude; let alt = oppositeVertice.altitude;

                            // Исходная точка
                            let objectP = polarToCartesian(lat, lon, alt, 1.0); let P = vec4<f32>(objectP.w, objectP.z, objectP.x, objectP.y);


                            // Касательный базис
                            let tangentBasis = createTangentBasis(lat, lon, alt);

                            return StartingPointParams(lat, alt, P, tangentBasis);
                        }

                        fn getRandomAngles(startingPointParams: StartingPointParams, arc: f32, seed: ptr<function, u32>) -> PolarAngles {

                            // Правильное распределение для равномерного покрытия:
                            // Вероятность попасть в сферическую шапочку радиуса d пропорциональна sin^3(d/R)
                            let R = 1.0; let distance = getDistance(R * inverseCDF_S3(random(seed)), R, arc, seed) * 2;

                            let angles = calculateNewPoint(
                                startingPointParams,
                                distance,//максимальная дистанция находится на противоположной стороне гиперсферы
                                acos(2.0 * random(seed) - 1),//eta. первый угол направления (полярный угол). 0 ≤ eta ≤ π
                                random(seed) * 2 * PI,//psi. второй угол направления (азимутальный угол). 0 ≤ psi < 2π или -π ≤ psi ≤ π
                                R,
                                seed
                            );
                            return angles;
                        }

                        fn GetRandomVertice(arc: f32, oppositeVertice: PolarAngles, seed: ptr<function, u32>) -> PolarAngles {
                            return getRandomAngles(getStartingPointParams(oppositeVertice), arc, seed);
                        }

                        /* МАТЕМАТИКА ВНУТРИ GPU */
                        fn cartesianToPolar(v: vec4<f32>) -> PolarAngles {
                            let R = length(v);
        	                if (R < 1e-10) {

                                messageBuffer.errorCode = 2u; // Код ошибки 2 = "cartesianToPolar: Under construction"
                                messageBuffer.i = 0;
                                messageBuffer.value = R;

                                return PolarAngles(0.0, 0.0, 0.0, 0.0);
        	                }
                            let alt = acos(clamp(v.w / R, -1.0, 1.0));

                            let rXYZ = length(v.xyz);
        	                // Если rXYZ близок к 0, значит точка лежит на оси W, 
        	                // и широта с долготой не определены (принимаем за 0)
        	                if (rXYZ < 1e-10) {
                                return PolarAngles(0.0, 0.0, alt, 0.0);
        	                }

                            let lat = asin(clamp(v.z / rXYZ, -1.0, 1.0));
                            let lon = atan2(v.y, v.x);
                            return PolarAngles(lat, lon, alt, 0.0);
                        }

                        fn cartesianToPolarRandom(Q: vec4<f32>) -> PolarAngles {
                            return cartesianToPolar(vec4<f32>(Q[2], Q[3], Q[1], Q[0] ));
                        }

                        fn polarToCartesian(lat: f32, lon: f32, alt: f32, r: f32) -> vec4<f32> {
                            let r_xyz = r * sin(alt);
                            return vec4<f32>(r_xyz * cos(lat) * cos(lon), r_xyz * cos(lat) * sin(lon), r_xyz * sin(lat), r * cos(alt));
                        }

                        ${DEBUG_MODE ? `var<private> isDebugInfo: bool = false;` : ``}

                        @compute @workgroup_size(64)
                        fn main(@builtin(global_invocation_id) id: vec3<u32>) {
                            let i = id.x;
                            if (i >= POINTS_PER_STEP) { return; }

                            // Инициализируем локальное состояние один раз
                            var seed = i ^ uTime;

                            ${DEBUG_MODE ? `if (i == 0u) { isDebugInfo = true; } else { isDebugInfo = false; }` : ``}
                              
                            ${DEBUG_MODE ? `if (isDebugInfo) {
                                debug.i = i;
                                debug.j = seed;
                                //debug.value = vec4<f32>(anglesBuf[currOffset + i].altitude, anglesBuf[currOffset + i].latitude, anglesBuf[currOffset + i].longitude, 0.0);
                                debug.value = vec4<f32>(0.0, 0.0, 0.0, 0.0);
                            }` : ``}

                            let prevOffset = u32(p_param.stepOffset - f32(POINTS_PER_STEP));
                            let currOffset = u32(p_param.stepOffset);

                            let p1 = positions[prevOffset + i];

                            // СБОР СИЛ
                            var force = vec4<f32>(0.0);
                            for (var j = 0u; j < POINTS_PER_STEP; j++) {
                                if (i == j) { continue; }
                                //${DEBUG_MODE ? `if ((i == 0u) && (j == 1u)) { isDebugInfo = true; } else { isDebugInfo = false; }` : ``}
                                let p2 = positions[prevOffset + j];
                                let angles2 = cartesianToPolar(p2);
                                var d = p1 - p2;
                                var dist = length(d);
                                let arc = PI - hyperbola_gpu((dist / p_param.radiusPrev / 2.0) * PI, i);

                                // Случайное направление для точки j (может быть противоположным для лучшего разведения)
                                let polarNoise2 = GetRandomVertice(arc, angles2, &seed);
                                let noise2 = polarToCartesian(polarNoise2.latitude, polarNoise2.longitude, polarNoise2.altitude, p_param.radiusPrev);

                                // Вектор от i к j
                                d = p1 - noise2;
                                let d2 = dot(d, d);
                                dist = sqrt(d2);
                                if (dist == 0) {
                                    messageBuffer.errorCode = 3u; // Код ошибки 3 = "main: Invalid dist"
                                    messageBuffer.i = 0;
                                    messageBuffer.value = dist;
                                    return;
                                }

                                let m = REPULSION / d2;
                                force.x += (d.x / dist) * m; force.y += (d.y / dist) * m; force.z += (d.z / dist) * m; force.w += (d.w / dist) * m;
                            }
                            
                            // ИНТЕГРАЦИЯ СКОРОСТИ И ПОЗИЦИИ
                            let v_new = velocities[i] * DAMPING + force;
                            velocities[i] = v_new;
                            let next_pos_unit = normalize(p1 + v_new);
                            positions[currOffset + i] = next_pos_unit * p_param.radiusPrev;
                            anglesBuf[currOffset + i] = cartesianToPolar(next_pos_unit);
                        
                        }
                    `;

            pipeline = device.createComputePipeline({
                layout: 'auto', compute: { module: device.createShaderModule({ code: dynamicShaderCode }), entryPoint: 'main' }
            });

            posBuf = device.createBuffer({ size: count * 16, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
            velBuf = device.createBuffer({ size: pointsPerStep * 16, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
            paramBuf = device.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
            debugBuf = device.createBuffer({ size: 32, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
            messageArray = device.createBuffer({ size: 16, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
            
            // Создаем буфер для одного числа u32. Этот буфер используется для генератора случайных чисел в GPU.
            timeBuffer = device.createBuffer({ size: 4, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
//            frameBuffer = device.createBuffer({ size: 4, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

            // Создание буфера для чтения debug данных на CPU
//            readDebugBuf = device.createBuffer({ size: 16, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });

            anglesBufGPU = device.createBuffer({ size: count * 16, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });

            const initialPos = new Float32Array(count * 4);
            const initialAngles = new Float32Array(count * 4);
            for (let i = 0; i < pointsPerStep; i++) {
                const p = polarToCartesian(angles[i].latitude, angles[i].longitude, angles[i].altitude, baseRadius), index = i * 4;
                initialPos[index] = p.x; initialPos[index + 1] = p.y; initialPos[index + 2] = p.z; initialPos[index + 3] = p.w;
                initialAngles[index] = angles[i].latitude; initialAngles[index + 1] = angles[i].longitude; initialAngles[index + 2] = angles[i].altitude;
            }
            device.queue.writeBuffer(posBuf, 0, initialPos);
            device.queue.writeBuffer(anglesBufGPU, 0, initialAngles);

            const entries = [
                { binding: 0, resource: { buffer: posBuf } },
                { binding: 1, resource: { buffer: velBuf } },
                { binding: 2, resource: { buffer: paramBuf } },
                { binding: 3, resource: { buffer: anglesBufGPU } },
                { binding: 4, resource: { buffer: messageArray } },
//                { binding: 5, resource: { buffer: frameBuffer } }
                { binding: 5, resource: { buffer: timeBuffer } }
            ]
            if (DEBUG_MODE) entries.push({ binding: 6, resource: { buffer: debugBuf } });
            bindGroup = device.createBindGroup({ layout: pipeline.getBindGroupLayout(0), entries: entries });
        }

        async function readDebugValue(step) {
            const readBuf = device.createBuffer({ size: 24, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
            const encoder = device.createCommandEncoder();
            encoder.copyBufferToBuffer(debugBuf, 0, readBuf, 0,
                16//value
                + 4//i
                + 4//j
                //+ 8//Padding (смещение 24, размер 8) — чтобы общий размер структуры был кратен 16.
            );

            await readBuf.mapAsync(GPUMapMode.READ);
            
            const mappedRange = readBuf.getMappedRange();

            const u = new Uint32Array(mappedRange);

        async function readMessageValue(step) {
            const readBuf = device.createBuffer({ size: 16, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
            const encoder = device.createCommandEncoder();
            
            // 1. Кодируем команду копирования из GPU-буфера в доступный для чтения буфер
            encoder.copyBufferToBuffer(
                messageArray, // Ваш исходный буфер из шейдера
                0, 
                readBuf,  // Вспомогательный буфер с GPUBufferUsage.MAP_READ
                0, 
                // Размер в байтах (u32 + u32 + f32 = 12 байт)
                4//errorCode
                +4//i
                +4//value
            );            
            
            device.queue.submit([encoder.finish()]);
            await readBuf.mapAsync(GPUMapMode.READ);

            const mappedRange = readBuf.getMappedRange();
            
            // 3. Создаем типизированный массив на основе данных буфера
            const message = new Uint32Array(mappedRange), messageCode = message[0];
            
            if (messageCode != 0) {

                    default: messageString = 'Unknown code: ' + messageCode;
                }

            }

        }

        async function finalSyncGPU() {
            const readBuf = device.createBuffer({ size: count * 16, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
            const enc = device.createCommandEncoder();
            enc.copyBufferToBuffer(anglesBufGPU, 0, readBuf, 0, count * 16);
            device.queue.submit([enc.finish()]);
            await readBuf.mapAsync(GPUMapMode.READ);
            const data = new Float32Array(readBuf.getMappedRange());
//            const color = new THREE.Color();
            for (let i = 0; i < count; i++) {
                if (i >= pointsPerStep) {
                    const pointAngles = angles[i]
                    pointAngles.latitude = data[i * 4]; pointAngles.longitude = data[i * 4 + 1]; pointAngles.altitude = data[i * 4 + 2];
                    const s = Math.floor(i / pointsPerStep);
                    const r = baseRadius + s * radiusStep;
                    setAttributes(pointAngles, r, i);
/*
                    const p = polarToCartesian(angles[i].latitude, angles[i].longitude, angles[i].altitude, r);
                    posAttr.setXYZ(i, p.x, p.y, p.z);
                    const t = (p.w + radiusMax) / (2 * radiusMax);
                    color.setHSL(0.7 * (1 - t), 1, 0.5);
                    colorAttr.setXYZ(i, color.r, color.g, color.b);
*/
                }
            }
            posAttr.needsUpdate = true; colorAttr.needsUpdate = true;
            readBuf.unmap(); readBuf.destroy();

        }

        // --- ЛОГИКА CPU (СИНХРОНИЗИРОВАНА С GPU j=0) ---
        const setVelocities = (velociti, DAMPING, force) => {

            velociti.x = velociti.x * DAMPING + force.x;
            velociti.y = velociti.y * DAMPING + force.y;
            velociti.z = velociti.z * DAMPING + force.z;
            velociti.w = velociti.w * DAMPING + force.w;

        }
        const setForse = (force, d, dist, m) => { force.x += (d.x / dist) * m; force.y += (d.y / dist) * m; force.z += (d.z / dist) * m; force.w += (d.w / dist) * m; }
        const getD = (p1, p2) => { return { x: p1.x - p2.x, y: p1.y - p2.y, z: p1.z - p2.z, w: p1.w - p2.w } }
        const getD2 = (d) => { return d.x * d.x + d.y * d.y + d.z * d.z + d.w * d.w }
        async function performStepCPU() {
            if (currentStep >= totalSteps) return;
            const prevStart = (currentStep - 1) * pointsPerStep;
            const currStart = currentStep * pointsPerStep;
            const newRadius = radiusPrev + radiusStep;
//            const color = new THREE.Color();
            const getPoint = (i) => {
                const pointAnglesPrev = angles[prevStart + i];
                const pPrev = polarToCartesian(pointAnglesPrev.latitude, pointAnglesPrev.longitude, pointAnglesPrev.altitude, radiusPrev);
                const pointAngles = cartesianToPolar(pPrev);
                //const pointAngles = angles[prevStart + i];
                return { angles: pointAngles, p: polarToCartesian(pointAngles.latitude, pointAngles.longitude, pointAngles.altitude, radiusPrev) }
            }

            for (let i = 0; i < pointsPerStep; i++) {
                const point = getPoint(i);
                const angles1 = point.angles;
                const p1 = point.p;
/*                
                const angles1 = angles[prevStart + i];
                const p1 = polarToCartesian(angles1.latitude, angles1.longitude, angles1.altitude, radiusPrev);
*/                
                const force = { x: 0, y: 0, z: 0, w: 0 }

                // Полный перебор для идентичности с шейдером
                for (let j = 0; j < pointsPerStep; j++) {
                    if (i === j) continue;
                    const point = getPoint(j);
                    const angles2 = point.angles;
                    const p2 = point.p;
/*                    
                    const angles2 = angles[prevStart + j];
                    const p2 = polarToCartesian(angles2.latitude, angles2.longitude, angles2.altitude, radiusPrev);
*/                    
                    let d = getD(p1, p2);
                    let dist = Math.sqrt(getD2(d));
                    const arc = π - hyperbola((dist / radiusPrev / 2) * π);
                    const r = radiusPrev;

                    // Случайное направление для точки j (может быть противоположным для лучшего разведения)
                    const polarNoise2 = GetRandomVertice(arc, angles2);
                    const noise2 = polarToCartesian(polarNoise2.latitude, polarNoise2.longitude, polarNoise2.altitude, r);

                    // Вектор от i к j
                    d = getD(p1, noise2);
                    const d2 = getD2(d);
                    dist = Math.sqrt(d2);
                    if (dist === 0) {
                        console.error('performStepCPU: step. Invalid dist = ' + dist);
                        return;
                    }
                    const m = REPULSION_STRENGTH / d2;
                    setForse(force, d, dist, m);
                }

                const velociti = velocities[i];
                setVelocities(velociti, DAMPING, force);

                const index = currStart + i;
                angles[index] = cartesianToPolar({ x: p1.x + velociti.x, y: p1.y + velociti.y, z: p1.z + velociti.z, w: p1.w + velociti.w });
                setAttributes(angles[index], newRadius, index);
/*
                const p = polarToCartesian(angles[currStart + i].latitude, angles[currStart + i].longitude, angles[currStart + i].altitude, newRadius);
                posAttr.setXYZ(currStart + i, p.x, p.y, p.z);
                const t = (p.w + radiusMax) / (2 * radiusMax);
                color.setHSL(0.7 * (1 - t), 1, 0.5);
                colorAttr.setXYZ(currStart + i, color.r, color.g, color.b);
*/
            }
            radiusPrev = newRadius; currentStep++;
            posAttr.needsUpdate = true; colorAttr.needsUpdate = true; updateDisplay();
        }

        function initPoints() {
            const color = new THREE.Color();
            if (!RANDOM_POINTS) {
                //angles[0] = { altitude: Math.PI / 1, latitude: Math.PI / 19, longitude: Math.PI / 10 };// Эта вершина лежит на оси W потомучто Altitude = Math.PI. Это приводит к тому что в функции cartesianToPolar величина rXYZ < 1e-10 и широта с долготой не определены (принимаем за 0)
                angles[0] = { altitude: Math.PI / 1.5, latitude: Math.PI / 19, longitude: Math.PI / 10 };
                angles[1] = { altitude: Math.PI / 2, latitude: Math.PI / 20, longitude: Math.PI / 11 };
                angles[2] = { altitude: Math.PI / 3, latitude: Math.PI / 21, longitude: Math.PI / 2 };
                angles[3] = { altitude: Math.PI / 4, latitude: Math.PI / 22, longitude: -Math.PI / 2 };
                angles[4] = { altitude: Math.PI / 5, latitude: Math.PI / 23, longitude: Math.PI };
            }
            for (let i = 0; i < pointsPerStep; i++) {
                if (RANDOM_POINTS || i >= 5) {
                    const u = Array.from({ length: 4 }, () => Math.random() * 2 - 1);
                    const norm = Math.sqrt(u.reduce((a, b) => a + b * b, 0)) || 1;
                    angles[i] = cartesianToPolar({ x: u[0] / norm, y: u[1] / norm, z: u[2] / norm, w: u[3] / norm });
                }
                const p = polarToCartesian(angles[i].latitude, angles[i].longitude, angles[i].altitude, baseRadius);
                posAttr.setXYZ(i, p.x, p.y, p.z);
                const t = (p.w + radiusMax) / (2 * radiusMax);
                color.setHSL(0.7 * (1 - t), 1, 0.5); colorAttr.setXYZ(i, color.r, color.g, color.b);
            }
            posAttr.needsUpdate = true; colorAttr.needsUpdate = true;
        }

        function updateDisplay() {
            document.getElementById('stepCounter').innerText = currentStep;
            document.getElementById('radVal').innerText = radiusPrev.toFixed(2);
        }

//        let frameCount = 0;//Необходим для генератора случайных чисел в GPU.
        
        const runAuto = async (mode) => {
            document.querySelectorAll('button').forEach(b => b.disabled = true);
            const start = performance.now();
            if (mode === 'GPU') {
                const idx = parseInt(document.getElementById('gpuSelect').value);
                if (idx === -1) { alert("Выберите карту"); document.querySelectorAll('button').forEach(b => b.disabled = false); return; }
                await initWebGPU(idx);
                while (currentStep < totalSteps) {

                    //Для генератора случайных чисел
                    device.queue.writeBuffer(timeBuffer, 0, new Uint32Array([Math.floor(performance.now() * timeMultiplier)]));
/*
                    frameCount++; // Увеличиваем счетчик
                    device.queue.writeBuffer( frameBuffer, 0, new Uint32Array([frameCount]));// Записываем текущее значение счетчика в буфер
*/
                    
                    const newRadius = radiusPrev + radiusStep;
                    device.queue.writeBuffer(paramBuf, 0, new Float32Array([radiusPrev, currentStep * pointsPerStep]));
                    const encoder = device.createCommandEncoder();
                    const pass = encoder.beginComputePass();
                    pass.setPipeline(pipeline); pass.setBindGroup(0, bindGroup);
                    pass.dispatchWorkgroups(Math.ceil(pointsPerStep / 64));
                    pass.end();
                    device.queue.submit([encoder.finish()]);
                    if (DEBUG_MODE) await readDebugValue(currentStep);
                    else await readMessageValue(currentStep);
                    updateDisplay();
                    radiusPrev = newRadius; currentStep++;
                }

//                if (DEBUG_MODE) await readDebugValue(currentStep);
                await readMessageValue(currentStep);
                await finalSyncGPU(); updateDisplay();
            } else {
                while (currentStep < totalSteps) { await performStepCPU(); await new Promise(r => requestAnimationFrame(r)); }
            }
            const end = performance.now();
            document.getElementById('timeResult').innerText = `Итог (${mode}): ${((end - start) / 1000).toFixed(3)} сек.`;
            document.querySelectorAll('button').forEach(b => b.disabled = false);
        };

        document.getElementById('stepBtn').onclick = () => performStepCPU();
        document.getElementById('startBtn').onclick = () => runAuto('CPU');
        document.getElementById('gpuBtn').onclick = () => runAuto('GPU');
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        findAdapters(); initPoints(); animate();
    </script>
</body>
</html>
